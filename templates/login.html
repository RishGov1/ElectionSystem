{% extends "layout.html" %}

{% block content %}
<div style="max-width: 450px; margin: 60px auto;">
    <div class="card" style="padding: 40px;">
        <h2 style="text-align: center; margin-top: 0; margin-bottom: 24px;">Login</h2>

        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label for="username" style="display: block; margin-bottom: 8px;">Username</label>
                <input type="text" id="username" name="username" class="form-control" required
                    placeholder="Enter your username">
            </div>

            <div style="margin-bottom: 24px;">
                <label for="password" style="display: block; margin-bottom: 8px;">Password</label>
                <input type="password" id="password" name="password" class="form-control" required
                    placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px;">Login</button>
        </form>


        <div
            style="margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); text-align: center;">
            <p style="margin-bottom: 0;">Don't have an account? <a href="{{ url_for('register') }}"
                    style="color: var(--accent-primary); text-decoration: none; font-weight: 500;">Register as a
                    Voter</a></p>
        </div>
    </div>
</div>
{% endblock %}
